# По README: два бэкенда + маршрутизация через шлюз.
# Сохраняем прежние пути /api/<resource> (проверка варианта) и добавляем /api/v1/...
upstream comments_upstream {
    server comments-svc-s01:8298;
}

upstream other_upstream {
    server other-svc-s01:8299;
}

server {
    listen 8080;

    # Новый контракт из README недели 03
    location /api/v1/comments {
        rewrite ^/api/v1/comments(.*)$ /api/comments$1 break;
        proxy_pass http://comments_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/other {
        rewrite ^/api/v1/other/?$ /other break;
        proxy_pass http://other_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Прямые маршруты из варианта (week-03.json gateway.routes)
    location /api/comments {
        proxy_pass http://comments_upstream/api/comments;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/comments/ {
        proxy_pass http://comments_upstream/api/comments/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
