apiVersion: apps/v1
kind: Deployment
metadata:
  name: items-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: items-app
  template:
    metadata:
      labels:
        app: items-app
    spec:
      containers:
      - name: items-container
        image: items-s01:latest
        ports:
        - containerPort: 8101
---
apiVersion: v1
kind: Service
metadata:
  name: items-svc-s01
spec:
  selector:
    app: items-app
  ports:
  - port: 8101
    targetPort: 8101