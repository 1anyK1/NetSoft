upstream comments_upstream {
    server comments-svc:8298;
}

upstream graphql_upstream {
    server items-graphql-svc:8101;
}

server {
    listen 80;

    location /api/comments {
        proxy_pass http://comments_upstream/api/comments;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/comments/ {
        proxy_pass http://comments_upstream/api/comments/;
        proxy_set_header Host $host;
    }

    location /graphql {
        proxy_pass http://graphql_upstream/graphql;
        proxy_set_header Host $host;
    }
}
