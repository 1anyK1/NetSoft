# Локальный стенд недели 11 (README): приложение варианта, Redis как зависимость, Nginx-шлюз.
services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - appnet

  logs-svc-s01:
    build: ./app
    environment:
      - GROUP=${GROUP:-332}
      - STUDENT_ID=${STUDENT_ID:-s01}
    expose:
      - "8159"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8159/health', timeout=2).read()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 5s
    networks:
      - appnet

  gateway:
    image: nginx:alpine
    ports:
      - "8088:80"
    volumes:
      - ./nginx.gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      logs-svc-s01:
        condition: service_healthy
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
