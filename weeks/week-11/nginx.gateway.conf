upstream logs_backend {
    server logs-svc-s01:8159;
}

server {
    listen 80;

    location /api/logs {
        proxy_pass http://logs_backend/api/logs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/logs/ {
        proxy_pass http://logs_backend/api/logs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
