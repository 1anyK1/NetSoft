apiVersion: apps/v1
kind: Deployment
metadata:
  name: logs-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logs-app
  template:
    metadata:
      labels:
        app: logs-app
    spec:
      containers:
        - name: logs-container
          image: logs-svc:latest
          ports:
            - containerPort: 8159
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8159
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8159
            initialDelaySeconds: 3
            periodSeconds: 5
